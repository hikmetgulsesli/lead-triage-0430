<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yeni Lead Ekleme</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-lowest": "#ffffff",
                      "error-container": "#ffdad6",
                      "tertiary-fixed": "#ffdbcd",
                      "surface-container-low": "#f3f3fe",
                      "background": "#faf8ff",
                      "on-surface-variant": "#434655",
                      "secondary-fixed": "#d5e3fc",
                      "on-surface": "#191b23",
                      "on-tertiary": "#ffffff",
                      "primary-fixed": "#dbe1ff",
                      "on-tertiary-fixed-variant": "#7d2d00",
                      "on-error-container": "#93000a",
                      "inverse-primary": "#b4c5ff",
                      "tertiary-fixed-dim": "#ffb596",
                      "on-background": "#191b23",
                      "surface-variant": "#e1e2ed",
                      "surface-container-high": "#e7e7f3",
                      "primary-container": "#2563eb",
                      "secondary-container": "#d5e3fc",
                      "on-primary-fixed": "#00174b",
                      "surface-container": "#ededf9",
                      "secondary": "#515f74",
                      "on-secondary-container": "#57657a",
                      "on-error": "#ffffff",
                      "on-secondary-fixed-variant": "#3a485b",
                      "on-primary-fixed-variant": "#003ea8",
                      "surface-container-highest": "#e1e2ed",
                      "on-secondary": "#ffffff",
                      "inverse-surface": "#2e3039",
                      "surface-tint": "#0053db",
                      "primary": "#004ac6",
                      "on-primary-container": "#eeefff",
                      "surface": "#faf8ff",
                      "primary-fixed-dim": "#b4c5ff",
                      "surface-bright": "#faf8ff",
                      "error": "#ba1a1a",
                      "secondary-fixed-dim": "#b9c7df",
                      "on-tertiary-container": "#ffede6",
                      "inverse-on-surface": "#f0f0fb",
                      "tertiary": "#943700",
                      "outline": "#737686",
                      "on-secondary-fixed": "#0d1c2e",
                      "surface-dim": "#d9d9e5",
                      "tertiary-container": "#bc4800",
                      "outline-variant": "#c3c6d7",
                      "on-tertiary-fixed": "#360f00",
                      "on-primary": "#ffffff"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "sm": "12px",
                      "base": "4px",
                      "xl": "32px",
                      "margin": "24px",
                      "xs": "8px",
                      "gutter": "16px",
                      "lg": "24px",
                      "md": "16px"
              },
              "fontFamily": {
                      "label-bold": ["Inter"],
                      "h3": ["Inter"],
                      "h1": ["Inter"],
                      "caption": ["Inter"],
                      "body-main": ["Inter"],
                      "body-large": ["Inter"],
                      "h2": ["Inter"]
              },
              "fontSize": {
                      "label-bold": ["12px", {"lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "600"}],
                      "h3": ["20px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600"}],
                      "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "caption": ["12px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "400"}],
                      "body-main": ["14px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}],
                      "body-large": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                      "h2": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}]
              }
            }
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            box-shadow: none;
        }
    </style>
</head>
<body class="bg-surface font-body-main text-body-main text-on-surface antialiased min-h-screen relative">
<!-- Background UI Context (Dimmed) -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-40">
<!-- TopNavBar Shared Component -->
<header class="bg-surface-container-lowest text-on-surface font-body-main w-full border-b border-surface-variant shadow-sm z-40">
<div class="flex items-center justify-between px-8 h-16 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-lg">
<div class="text-xl font-bold tracking-tight text-on-surface">Lead Triage</div>
<nav class="hidden md:flex gap-md">
<a class="text-primary border-b-2 border-primary font-label-bold text-label-bold pb-4 -mb-4 flex items-center h-full pt-4" href="#">Leads</a>
<a class="text-on-surface-variant hover:text-on-surface font-label-bold text-label-bold transition-all flex items-center h-full pt-4" href="#">Pipeline</a>
<a class="text-on-surface-variant hover:text-on-surface font-label-bold text-label-bold transition-all flex items-center h-full pt-4" href="#">Insights</a>
<a class="text-on-surface-variant hover:text-on-surface font-label-bold text-label-bold transition-all flex items-center h-full pt-4" href="#">Settings</a>
</nav>
</div>
<div class="flex items-center gap-sm">
<button class="p-xs text-on-surface-variant hover:bg-surface-variant rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button class="p-xs text-on-surface-variant hover:bg-surface-variant rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
<div class="h-8 w-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-label-bold ml-sm">
                        U
                    </div>
</div>
</div>
</header>
<main class="max-w-7xl mx-auto p-margin mt-lg">
<div class="h-[600px] w-full bg-surface-container-low rounded-xl border border-surface-variant border-dashed"></div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-on-surface/60 backdrop-blur-sm z-50 flex items-center justify-center p-md overflow-y-auto">
<!-- Modal Container -->
<div aria-labelledby="modal-title" aria-modal="true" class="bg-surface-container-lowest rounded-xl shadow-[0_10px_25px_rgba(0,0,0,0.1)] border border-surface-variant w-full max-w-2xl mx-auto my-auto flex flex-col" role="dialog">
<!-- Modal Header -->
<div class="flex items-center justify-between p-lg border-b border-surface-variant bg-surface-container-lowest rounded-t-xl">
<h2 class="font-h2 text-h2 text-on-surface m-0" id="modal-title">Yeni Lead Ekle</h2>
<button aria-label="Kapat" class="text-on-surface-variant hover:text-on-surface hover:bg-surface-variant p-xs rounded transition-colors flex items-center justify-center cursor-pointer" type="button">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Modal Body (Form) -->
<form class="flex flex-col">
<div class="p-lg grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Ad Soyad -->
<div class="flex flex-col gap-base col-span-1">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="adSoyad">Ad Soyad</label>
<input class="w-full px-sm py-[8px] bg-surface-container-lowest border border-outline-variant rounded text-on-surface font-body-main text-body-main focus:border-primary focus:ring-2 focus:ring-primary-container transition-all" id="adSoyad" name="adSoyad" placeholder="Örn: Ahmet Yılmaz" type="text"/>
</div>
<!-- Şirket -->
<div class="flex flex-col gap-base col-span-1">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="sirket">Şirket</label>
<input class="w-full px-sm py-[8px] bg-surface-container-lowest border border-outline-variant rounded text-on-surface font-body-main text-body-main focus:border-primary focus:ring-2 focus:ring-primary-container transition-all" id="sirket" name="sirket" placeholder="Örn: Teknoloji A.Ş." type="text"/>
</div>
<!-- Kaynak -->
<div class="flex flex-col gap-base col-span-1">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="kaynak">Kaynak</label>
<div class="relative">
<select class="w-full px-sm py-[8px] pr-10 bg-surface-container-lowest border border-outline-variant rounded text-on-surface font-body-main text-body-main focus:border-primary focus:ring-2 focus:ring-primary-container transition-all appearance-none cursor-pointer" id="kaynak" name="kaynak">
<option disabled="" selected="" value="">Seçiniz</option>
<option value="inbound">Web Sitesi (Inbound)</option>
<option value="outbound">Soğuk Arama (Outbound)</option>
<option value="referral">Referans</option>
<option value="event">Etkinlik/Fuar</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-sm text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Tahmini Değer -->
<div class="flex flex-col gap-base col-span-1">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="deger">Tahmini Değer (₺)</label>
<input class="w-full px-sm py-[8px] bg-surface-container-lowest border border-outline-variant rounded text-on-surface font-body-main text-body-main focus:border-primary focus:ring-2 focus:ring-primary-container transition-all" id="deger" min="0" name="deger" placeholder="0.00" step="1000" type="number"/>
</div>
<!-- Durum -->
<div class="flex flex-col gap-base col-span-1">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="durum">Durum</label>
<div class="relative">
<select class="w-full px-sm py-[8px] pr-10 bg-surface-container-lowest border border-outline-variant rounded text-on-surface font-body-main text-body-main focus:border-primary focus:ring-2 focus:ring-primary-container transition-all appearance-none cursor-pointer" id="durum" name="durum">
<option selected="" value="yeni">Yeni</option>
<option value="iletisim">İletişime Geçildi</option>
<option value="toplanti">Toplantı Planlandı</option>
<option value="teklif">Teklif Sunuldu</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-sm text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Tarih -->
<div class="flex flex-col gap-base col-span-1">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="tarih">Kayıt Tarihi</label>
<input class="w-full px-sm py-[8px] bg-surface-container-lowest border border-outline-variant rounded text-on-surface font-body-main text-body-main focus:border-primary focus:ring-2 focus:ring-primary-container transition-all" id="tarih" name="tarih" type="date"/>
</div>
<!-- Sonraki Aksiyon -->
<div class="flex flex-col gap-base col-span-1 md:col-span-2 mt-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="aksiyon">Sonraki Aksiyon</label>
<textarea class="w-full px-sm py-[8px] bg-surface-container-lowest border border-outline-variant rounded text-on-surface font-body-main text-body-main focus:border-primary focus:ring-2 focus:ring-primary-container transition-all resize-y" id="aksiyon" name="aksiyon" placeholder="Lead ile ilgili alınacak bir sonraki adımı buraya not edin..." rows="3"></textarea>
</div>
</div>
<!-- Modal Footer -->
<div class="px-lg py-md border-t border-surface-variant bg-surface-container-lowest rounded-b-xl flex items-center justify-end gap-sm">
<button class="px-md py-[8px] bg-surface-container-lowest border border-outline-variant text-on-surface rounded font-label-bold text-label-bold hover:bg-surface-variant hover:text-on-surface transition-colors cursor-pointer" type="button">
                        Vazgeç
                    </button>
<button class="px-md py-[8px] bg-primary text-on-primary border border-transparent rounded font-label-bold text-label-bold hover:bg-on-primary-fixed-variant transition-colors cursor-pointer flex items-center gap-xs" type="submit">
<span class="material-symbols-outlined text-[18px]" data-icon="add">add</span>
                        Lead Ekle
                    </button>
</div>
</form>
</div>
</div>
</body></html>
