<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Silme Onay Modalı</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#434655",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#ffb596",
                        "secondary-fixed": "#d5e3fc",
                        "tertiary": "#943700",
                        "on-surface": "#191b23",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#00174b",
                        "on-secondary-fixed-variant": "#3a485b",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "surface-container": "#ededf9",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-secondary-fixed": "#0d1c2e",
                        "surface-dim": "#d9d9e5",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-variant": "#e1e2ed",
                        "on-primary-container": "#eeefff",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-tertiary-fixed": "#360f00",
                        "error-container": "#ffdad6",
                        "surface-bright": "#faf8ff",
                        "outline-variant": "#c3c6d7",
                        "surface-container-highest": "#e1e2ed",
                        "secondary-container": "#d5e3fc",
                        "secondary": "#515f74",
                        "inverse-on-surface": "#f0f0fb",
                        "background": "#faf8ff",
                        "primary-container": "#2563eb",
                        "surface-tint": "#0053db",
                        "outline": "#737686",
                        "inverse-surface": "#2e3039",
                        "error": "#ba1a1a",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary-container": "#ffede6",
                        "on-secondary-container": "#57657a",
                        "surface-container-high": "#e7e7f3",
                        "surface": "#faf8ff",
                        "tertiary-fixed": "#ffdbcd",
                        "inverse-primary": "#b4c5ff",
                        "surface-container-low": "#f3f3fe",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#191b23",
                        "tertiary-container": "#bc4800",
                        "primary": "#004ac6",
                        "secondary-fixed-dim": "#b9c7df"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xs": "8px",
                        "sm": "12px",
                        "xl": "32px",
                        "base": "4px",
                        "gutter": "16px",
                        "margin": "24px",
                        "md": "16px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "h1": ["Inter"],
                        "h2": ["Inter"],
                        "body-large": ["Inter"],
                        "h3": ["Inter"],
                        "body-main": ["Inter"],
                        "label-bold": ["Inter"],
                        "caption": ["Inter"]
                    },
                    "fontSize": {
                        "h1": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "h2": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-large": ["16px", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
                        "h3": ["20px", { "lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600" }],
                        "body-main": ["14px", { "lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400" }],
                        "label-bold": ["12px", { "lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "caption": ["12px", { "lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen font-body-main text-body-main antialiased flex flex-col">
<!-- Navbar Suppressed per task (focus on modal, linear/transactional intent) -->
<!-- Modal Backdrop & Canvas -->
<main class="flex-grow flex items-center justify-center p-md bg-surface-variant/80 backdrop-blur-sm z-50 fixed inset-0">
<!-- Modal Container -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_10px_25px_rgba(0,0,0,0.10)] border border-outline-variant w-full max-w-[400px] overflow-hidden flex flex-col">
<!-- Modal Header (Warning Icon + Title) -->
<div class="p-lg flex flex-col items-center text-center space-y-md border-b border-outline-variant/30">
<div class="w-12 h-12 rounded-full bg-error-container flex items-center justify-center text-error mb-xs">
<span class="material-symbols-outlined" data-icon="warning" style="font-size: 28px;">warning</span>
</div>
<h2 class="font-h3 text-h3 text-on-surface">Leadı Sil</h2>
<p class="font-body-large text-body-large text-on-surface-variant max-w-[280px]">
                    Bu lead kalıcı olarak silinecek. Emin misiniz?
                </p>
</div>
<!-- Modal Actions -->
<div class="p-md flex flex-row gap-md bg-surface-container-low justify-end items-center">
<!-- Secondary Button (Cancel) -->
<button class="px-gutter py-sm rounded border border-outline-variant bg-surface-container-lowest text-on-surface font-label-bold text-label-bold hover:bg-surface-variant transition-colors min-w-[100px]" type="button">
                    İptal
                </button>
<!-- Primary Action Button (Danger) -->
<button class="px-gutter py-sm rounded bg-error text-on-error font-label-bold text-label-bold hover:bg-error/90 transition-colors shadow-sm min-w-[100px] flex items-center justify-center gap-xs" type="button">
<span class="material-symbols-outlined" data-icon="delete" style="font-size: 16px;">delete</span>
                    Evet, Sil
                </button>
</div>
</div>
</main>
</body></html>
