<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profil / Account Panel</title>
<!-- Google Fonts & Material Symbols -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface-variant": "#434655",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#ffb596",
                    "secondary-fixed": "#d5e3fc",
                    "tertiary": "#943700",
                    "on-surface": "#191b23",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-primary-fixed": "#00174b",
                    "on-secondary-fixed-variant": "#3a485b",
                    "on-error-container": "#93000a",
                    "on-primary": "#ffffff",
                    "surface-container": "#ededf9",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-secondary-fixed": "#0d1c2e",
                    "surface-dim": "#d9d9e5",
                    "on-primary-fixed-variant": "#003ea8",
                    "surface-variant": "#e1e2ed",
                    "on-primary-container": "#eeefff",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "on-tertiary-fixed": "#360f00",
                    "error-container": "#ffdad6",
                    "surface-bright": "#faf8ff",
                    "outline-variant": "#c3c6d7",
                    "surface-container-highest": "#e1e2ed",
                    "secondary-container": "#d5e3fc",
                    "secondary": "#515f74",
                    "inverse-on-surface": "#f0f0fb",
                    "background": "#faf8ff",
                    "primary-container": "#2563eb",
                    "surface-tint": "#0053db",
                    "outline": "#737686",
                    "inverse-surface": "#2e3039",
                    "error": "#ba1a1a",
                    "primary-fixed": "#dbe1ff",
                    "on-tertiary-container": "#ffede6",
                    "on-secondary-container": "#57657a",
                    "surface-container-high": "#e7e7f3",
                    "surface": "#faf8ff",
                    "tertiary-fixed": "#ffdbcd",
                    "inverse-primary": "#b4c5ff",
                    "surface-container-low": "#f3f3fe",
                    "surface-container-lowest": "#ffffff",
                    "on-background": "#191b23",
                    "tertiary-container": "#bc4800",
                    "primary": "#004ac6",
                    "secondary-fixed-dim": "#b9c7df"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "xs": "8px",
                    "sm": "12px",
                    "xl": "32px",
                    "base": "4px",
                    "gutter": "16px",
                    "margin": "24px",
                    "md": "16px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "h1": ["Inter"],
                    "h2": ["Inter"],
                    "body-large": ["Inter"],
                    "h3": ["Inter"],
                    "body-main": ["Inter"],
                    "label-bold": ["Inter"],
                    "caption": ["Inter"]
            },
            "fontSize": {
                    "h1": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                    "h2": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                    "body-large": ["16px", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
                    "h3": ["20px", { "lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600" }],
                    "body-main": ["14px", { "lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400" }],
                    "label-bold": ["12px", { "lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "600" }],
                    "caption": ["12px", { "lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "400" }]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface h-screen w-screen overflow-hidden relative font-body-main text-body-main">
<!-- Faux Main Content Area to show the drawer overlaying -->
<main class="w-full h-full p-margin flex flex-col bg-surface">
<h1 class="font-h1 text-h1 text-on-surface mb-margin">Dashboard</h1>
<div class="w-full h-64 bg-surface-container-lowest border border-outline-variant rounded shadow-sm"></div>
</main>
<!-- Overlay Backdrop -->
<div class="fixed inset-0 bg-on-surface/40 z-40 backdrop-blur-sm transition-opacity"></div>
<!-- Right Drawer (SideNavBar variant based on Shared Components) -->
<aside class="fixed right-0 top-0 h-full w-[400px] z-50 bg-surface-container-lowest border-l border-outline-variant shadow-2xl flex flex-col transform transition-transform duration-300 ease-in-out font-body-main text-body-main">
<!-- Header -->
<header class="flex items-center justify-between p-margin border-b border-outline-variant">
<h2 class="font-h3 text-h3 text-on-surface m-0 p-0">Hesap Bilgileri</h2>
<button class="p-base text-on-surface-variant hover:text-on-surface hover:bg-surface-container-low rounded transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</header>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto p-margin space-y-xl">
<!-- User Profile Section -->
<section class="space-y-sm">
<div class="flex items-center gap-sm mb-md">
<span class="material-symbols-outlined text-[20px] text-primary">person</span>
<h3 class="font-label-bold text-label-bold text-on-surface uppercase tracking-wider">Profil Bilgileri</h3>
</div>
<div class="flex flex-col gap-base">
<label class="font-caption text-caption text-on-surface-variant" for="username">Kullanıcı Adı</label>
<input class="w-full h-10 px-sm py-xs border border-outline-variant rounded bg-surface-container-lowest text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-body-main text-body-main" id="username" type="text" value="Freelancer"/>
</div>
</section>
<hr class="border-outline-variant"/>
<!-- Timezone Section -->
<section class="space-y-sm">
<div class="flex items-center gap-sm mb-md">
<span class="material-symbols-outlined text-[20px] text-primary">schedule</span>
<h3 class="font-label-bold text-label-bold text-on-surface uppercase tracking-wider">Zaman Dilimi</h3>
</div>
<div class="flex flex-col gap-base">
<label class="font-caption text-caption text-on-surface-variant" for="timezone">Yerel Saat Dilimi</label>
<div class="relative">
<select class="w-full h-10 px-sm py-xs border border-outline-variant rounded bg-surface-container-lowest text-on-surface appearance-none focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-body-main text-body-main" id="timezone">
<option selected="" value="Europe/Istanbul">(UTC+03:00) İstanbul</option>
<option value="Europe/London">(UTC+00:00) Londra</option>
<option value="America/New_York">(UTC-05:00) New York</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant text-[20px]">expand_more</span>
</div>
</div>
</section>
<hr class="border-outline-variant"/>
<!-- Notifications Section -->
<section class="space-y-sm">
<div class="flex items-center gap-sm mb-md">
<span class="material-symbols-outlined text-[20px] text-primary">notifications</span>
<h3 class="font-label-bold text-label-bold text-on-surface uppercase tracking-wider">Bildirim Tercihleri</h3>
</div>
<div class="flex flex-col gap-md">
<!-- Toggle 1 -->
<label class="flex items-center justify-between cursor-pointer group">
<span class="font-body-main text-body-main text-on-surface group-hover:text-primary transition-colors">E-posta bildirimleri</span>
<div class="relative">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-10 h-6 bg-surface-variant rounded-full peer peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-primary/20 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-outline-variant after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</div>
</label>
<!-- Toggle 2 -->
<label class="flex items-center justify-between cursor-pointer group">
<span class="font-body-main text-body-main text-on-surface group-hover:text-primary transition-colors">Uygulama içi hatırlatıcılar</span>
<div class="relative">
<input class="sr-only peer" type="checkbox"/>
<div class="w-10 h-6 bg-surface-variant rounded-full peer peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-primary/20 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-outline-variant after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</div>
</label>
</div>
</section>
</div>
<!-- Footer Actions -->
<footer class="p-margin border-t border-outline-variant flex items-center justify-between bg-surface-container-low">
<button class="px-md py-xs h-10 border border-outline-variant rounded text-on-surface hover:bg-surface-variant transition-colors font-label-bold text-label-bold">
                Kapat
            </button>
<button class="px-md py-xs h-10 bg-error text-on-error rounded hover:bg-error-container hover:text-on-error-container transition-colors font-label-bold text-label-bold flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">logout</span>
                Çıkış Yap
            </button>
</footer>
</aside>
</body></html>
