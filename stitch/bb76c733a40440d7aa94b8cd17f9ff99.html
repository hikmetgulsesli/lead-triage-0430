<body class="bg-background text-on-background font-body-main antialiased h-screen flex flex-col">

<header class="flex items-center justify-between px-6 h-16 w-full bg-white dark:bg-slate-900 z-50 docked full-width top-0 border-b border-b border-slate-200 dark:border-slate-800 shadow-sm dark:shadow-none font-['Inter'] text-sm antialiased">

<div class="text-lg font-bold tracking-tight text-slate-900 dark:text-slate-50">Lead Triage 0430</div>
<nav class="hidden md:flex gap-4">

<a class="text-slate-500 dark:text-slate-400 font-medium hover:text-slate-900 dark:hover:text-slate-100 transition-colors duration-200 ease-in-out hover:bg-slate-50 dark:hover:bg-slate-800/50 rounded-md px-3 py-2" href="#">Ayarlar</a>
</nav>

<div class="flex items-center gap-4 text-blue-600 dark:text-blue-400">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</div>
</header>
</div>
<!-- Main Content Area (Background) -->
<main class="flex-1 p-margin relative">
<div class="max-w-7xl mx-auto">
<div class="flex items-center justify-between mb-margin">
<h1 class="font-h1 text-h1 text-on-surface">Mevcut Leads</h1>
<button class="bg-primary text-on-primary px-sm py-xs rounded flex items-center gap-xs font-label-bold text-label-bold">
<span class="material-symbols-outlined text-[20px]">add</span>
                    Yeni Lead
                </button>
</div>
<!-- Dummy List Content -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md shadow-sm">
<div class="border-b border-outline-variant pb-xs mb-sm flex justify-between font-label-bold text-label-bold text-on-surface-variant">
<div class="w-1/4">Ad / Şirket</div>
<div class="w-1/4">Kaynak</div>
<div class="w-1/4">Durum</div>
<div class="w-1/4 text-right">Tahmini Değer</div>
</div>
<div class="py-sm flex justify-between items-center hover:bg-surface-container-low transition-colors rounded-DEFAULT px-xs">
<div class="w-1/4">
<div class="font-body-main text-body-main text-on-surface font-semibold">Ahmet Yılmaz</div>
<div class="font-caption text-caption text-on-surface-variant">TechCorp A.Ş.</div>
</div>
<div class="w-1/4">
<span class="bg-secondary-container text-on-secondary-container px-2 py-1 rounded-full font-caption text-caption">LinkedIn</span>
</div>
<div class="w-1/4">
<span class="bg-tertiary-container/20 text-tertiary-container px-2 py-1 rounded-full font-caption text-caption">Görüşülüyor</span>
</div>
<div class="w-1/4 text-right font-body-main text-body-main text-on-surface">₺45,000</div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-on-surface/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">

<div class="bg-surface-container-lowest w-full max-w-2xl rounded-xl shadow-[0_10px_25px_rgba(0,0,0,0.1)] border border-outline-variant flex flex-col max-h-[921px] overflow-hidden">
<!-- Modal Header -->
<div class="px-lg py-md border-b border-outline-variant flex items-center justify-between bg-surface-bright">
<h2 class="font-h2 text-h2 text-on-surface">Yeni Lead Ekle</h2>
<button class="text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body -->
<div class="p-lg overflow-y-auto flex-1">
<form class="space-y-margin">
<!-- Grid Layout for Fields -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Ad Field -->
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="leadName">Ad Soyad</label>
<input class="border border-outline-variant rounded bg-surface-container-lowest px-sm py-xs font-body-main text-body-main text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" id="leadName" placeholder="Örn. Ayşe Demir" type="text"/>
</div>
<!-- Şirket Field -->
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="leadCompany">Şirket</label>
<input class="border border-outline-variant rounded bg-surface-container-lowest px-sm py-xs font-body-main text-body-main text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" id="leadCompany" placeholder="Örn. Global Yazılım" type="text"/>
</div>
<!-- Kaynak Field -->
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="leadSource">Kaynak</label>
<div class="relative">
<select class="appearance-none w-full border border-outline-variant rounded bg-surface-container-lowest px-sm py-xs font-body-main text-body-main text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all pr-10" id="leadSource">
<option disabled="" selected="" value="">Seçiniz</option>
<option value="upwork">Upwork</option>
<option value="linkedin">LinkedIn</option>
<option value="referans">Referans</option>
<option value="website">Web Sitesi</option>
<option value="diger">Diğer</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Tahmini Değer Field -->
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="leadValue">Tahmini Değer</label>
<div class="relative">
<span class="absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant font-body-main text-body-main">₺</span>
<input class="w-full border border-outline-variant rounded bg-surface-container-lowest pl-[28px] pr-sm py-xs font-body-main text-body-main text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" id="leadValue" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Durum Field -->
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="leadStatus">Durum</label>
<div class="relative">
<select class="appearance-none w-full border border-outline-variant rounded bg-surface-container-lowest px-sm py-xs font-body-main text-body-main text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all pr-10" id="leadStatus">
<option value="yeni">Yeni</option>
<option value="iletisim">İletişim Kuruldu</option>
<option value="teklif">Teklif Verildi</option>
<option value="beklemede">Beklemede</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Tarih Field -->
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="leadDate">Tarih</label>
<div class="relative">
<input class="w-full border border-outline-variant rounded bg-surface-container-lowest px-sm py-xs font-body-main text-body-main text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" id="leadDate" type="date"/>
</div>
</div>
</div>
<!-- Sonraki Aksiyon Field (Full Width) -->
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="leadAction">Sonraki Aksiyon</label>
<textarea class="border border-outline-variant rounded bg-surface-container-lowest px-sm py-xs font-body-main text-body-main text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all resize-none" id="leadAction" placeholder="Örn. Cuma günü teklif detayları için tekrar aranacak..." rows="3"></textarea>
</div>
</form>
</div>

<div class="px-lg py-md border-t border-outline-variant bg-surface-container-low flex justify-end gap-sm items-center">
<button class="px-md py-xs rounded border border-outline-variant bg-surface-container-lowest text-on-surface font-label-bold text-label-bold hover:bg-surface-variant transition-colors">
                        Vazgeç

                        Lead Ekle
